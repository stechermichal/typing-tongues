<div
  class="flex min-h-screen flex-col items-center justify-center bg-bg-general py-6"
>
  <div class="rounded bg-bg-component p-8 shadow-md">
    <p class="font-mono text-xl">
      <span class="text-text-typed">{{ typedText }}</span>
      <span class="text-text-highlight">{{ currentChar }}</span>
      <span class="text-text-to-type">{{ remainingText }}</span>
    </p>
    <input
      class="mt-4 w-full rounded bg-bg-button p-2 text-text-typed shadow"
      [(ngModel)]="userTyping"
      (input)="onUserType($event)"
    />
  </div>
</div>
