<div
  class="flex min-h-screen flex-col items-center justify-center bg-background py-6"
>
  <div class="rounded bg-backgroundSecondary p-8 text-primary shadow-md">
    <p class="font-mono text-xl">
      <span class="text-secondary">{{ typedText }}</span>
      <span class="text-error">{{ currentChar }}</span>
      <span class="text-primary">{{ remainingText }}</span>
    </p>
    <input
      class="mt-4 w-full rounded bg-backgroundTertiary p-2 text-primary shadow"
      [(ngModel)]="userTyping"
      (input)="onUserType($event)"
    />
  </div>
</div>
