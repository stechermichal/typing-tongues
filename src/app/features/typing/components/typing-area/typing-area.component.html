<div class="flex min-h-screen flex-col items-center justify-center py-6">
  <div class="rounded bg-gray-800 p-8 text-white shadow-md">
    <p class="font-mono text-xl">
      <span class="text-gray-500">{{ typedText }}</span>
      <span class="text-red-500">{{ currentChar }}</span>
      <span class="text-gray-300">{{ remainingText }}</span>
    </p>
    <input
      class="mt-4 w-full rounded bg-gray-700 p-2 text-white shadow"
      [(ngModel)]="userTyping"
      (input)="onUserType($event)"
    />
  </div>
</div>
