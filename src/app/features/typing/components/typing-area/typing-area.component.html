<div
  class="flex min-h-screen flex-col items-center justify-center bg-bg-general py-6"
>
  <div class="rounded bg-bg-component p-8 shadow-md">
    <p class="font-mono text-xl">
      <ng-container *ngFor="let char of typedText.split(''); let i = index">
        <span
          [ngClass]="{
            'text-text-error': correctTyping[i] === '0',
            'text-text-typed': correctTyping[i] === '1'
          }"
          >{{ char }}</span
        >
      </ng-container>
      <span class="text-text-highlight">{{
        currentChar === ' ' ? '_' : currentChar
      }}</span>
      <span class="text-text-to-type">{{ remainingText }}</span>
    </p>
    <p
      class="whitespace-pre-wrap font-mono text-xl"
      [innerHTML]="mistakeText"
      [ngClass]="{ 'text-text-typed': mistakeText.length > 0 }"
    ></p>

    <textarea
      #hiddenInput
      class="absolute opacity-0"
      [(ngModel)]="userTyping"
      (input)="onUserType($event)"
    ></textarea>
  </div>
</div>
