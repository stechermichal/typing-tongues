<div
  class="flex min-h-screen flex-col items-center justify-center bg-bg-general py-6"
>
  <div class="rounded bg-bg-component p-8 shadow-md">
    <p class="font-mono text-xl">
      <!-- Iterate over each character of the typed text -->
      <ng-container *ngFor="let char of typedText.split(''); let i = index">
        <span
          [ngClass]="{
            'text-text-error': correctTyping[i] === '0',
            'text-text-typed': correctTyping[i] === '1'
          }"
          >{{ char }}</span
        >
      </ng-container>
      <!-- Animated blinking caret to indicate current typing position -->
      <span
        class="relative inline-block h-[1.25em] w-[0.1px] animate-blink"
        [ngClass]="{
          'bg-text-highlight': currentChar,
          'bg-transparent': !currentChar
        }"
        style="bottom: -0.25em"
      ></span>
      <!-- The current character to type (spaces are represented by underscores) -->
      <span class="text-text-highlight">{{
        currentChar === ' ' ? '_' : currentChar
      }}</span>
      <span class="text-text-to-type">{{ remainingText }}</span>
    </p>
    <!--  Area for typing mistakes -->
    <p
      class="whitespace-pre-wrap font-mono text-xl"
      [innerHTML]="mistakeText"
      [ngClass]="{ 'text-main-mute-color': mistakeText.length > 0 }"
    ></p>
    <!-- Invisible input area for capturing user typing. Its updates trigger the typing mechanism. -->
    <textarea
      #hiddenInput
      class="absolute opacity-0"
      [(ngModel)]="userTyping"
      (input)="onUserType($event)"
    ></textarea>
  </div>
</div>
